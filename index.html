<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeriScore Demo — VeriPura</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'DM Sans', sans-serif;
  background: #F8F9FB;
  margin: 0;
  padding: 40px;
  color: #1A2332;
}

.container {
  max-width: 1100px;
  margin: auto;
}

h1 {
  font-weight: 600;
  margin-bottom: 10px;
}

.card {
  background: white;
  padding: 24px;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

label {
  font-size: 14px;
  display: block;
  margin-bottom: 6px;
}

select, input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #CBD8E8;
}

button {
  margin-top: 20px;
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  background: #2E5FA3;
  color: white;
  font-weight: 500;
  cursor: pointer;
}

.result {
  text-align: center;
}

.score {
  font-size: 64px;
  font-weight: 600;
}

.tag {
  padding: 6px 12px;
  border-radius: 20px;
  display: inline-block;
  margin-top: 10px;
  font-size: 14px;
}

.low { background: #D4EDDA; color: #155724; }
.medium { background: #FFF3CD; color: #856404; }
.high { background: #F8D7DA; color: #721C24; }

.metric {
  margin-top: 10px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container">

<h1>VeriScore Demo</h1>
<p>Simulate risk scoring for tokenized food trade receivables</p>

<div class="card grid">

<div>
  <label>Compliance Status</label>
  <select id="compliance">
    <option value="1">Fully Verified</option>
    <option value="0.7">Partial</option>
    <option value="0.4">Unverified</option>
  </select>

  <label>Importer Strength</label>
  <select id="importer">
    <option value="1">Tier 1 Buyer</option>
    <option value="0.8">Established</option>
    <option value="0.5">Unknown</option>
  </select>

  <label>Document Authenticity</label>
  <select id="docs">
    <option value="1">Verified + Notarized</option>
    <option value="0.7">Verified</option>
    <option value="0.4">Unverified</option>
  </select>

  <label>Shipment Risk</label>
  <select id="shipment">
    <option value="1">Low (Processed Goods)</option>
    <option value="0.7">Medium</option>
    <option value="0.4">High (Fresh / Perishable)</option>
  </select>

  <label>Corridor Risk</label>
  <select id="corridor">
    <option value="1">Low (EU ↔ OECD)</option>
    <option value="0.7">Medium</option>
    <option value="0.4">High Risk Corridor</option>
  </select>

  <button onclick="calculateScore()">Calculate VeriScore</button>
</div>

<div class="result">

<div class="score" id="score">--</div>

<div id="riskTag" class="tag">Awaiting Input</div>

<div class="metric">PD: <span id="pd">--</span></div>
<div class="metric">Expected Loss: <span id="el">--</span></div>

</div>

</div>

<div class="card">
<h3>Factor Breakdown</h3>
<div id="breakdown"></div>
</div>

</div>

<script>
function calculateScore() {
  let compliance = parseFloat(document.getElementById('compliance').value);
  let importer = parseFloat(document.getElementById('importer').value);
  let docs = parseFloat(document.getElementById('docs').value);
  let shipment = parseFloat(document.getElementById('shipment').value);
  let corridor = parseFloat(document.getElementById('corridor').value);

  let score =
    compliance * 25 +
    importer * 20 +
    docs * 15 +
    shipment * 15 +
    corridor * 10;

  score = Math.round(score);

  document.getElementById('score').innerText = score;

  let pd;
  if (score >= 85) pd = 0.015;
  else if (score >= 70) pd = 0.04;
  else pd = 0.08;

  let lgd = 0.3;
  let el = (pd * lgd * 100).toFixed(2) + "%";

  document.getElementById('pd').innerText = (pd * 100).toFixed(2) + "%";
  document.getElementById('el').innerText = el;

  let tag = document.getElementById('riskTag');

  if (score >= 85) {
    tag.innerText = "Prime";
    tag.className = "tag low";
  } else if (score >= 70) {
    tag.innerText = "Core";
    tag.className = "tag medium";
  } else {
    tag.innerText = "High Risk";
    tag.className = "tag high";
  }

  document.getElementById('breakdown').innerHTML = `
    Compliance: ${compliance * 25}<br>
    Importer: ${importer * 20}<br>
    Documents: ${docs * 15}<br>
    Shipment: ${shipment * 15}<br>
    Corridor: ${corridor * 10}
  `;
}
</script>

</body>
</html>
