<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeriScore Vault Simulator</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'DM Sans', sans-serif;
  background: #F8F9FB;
  margin: 0;
  padding: 40px;
  color: #1A2332;
}

.container { max-width: 1200px; margin: auto; }

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

h2 { margin-top: 0; }

.table {
  width: 100%;
  border-collapse: collapse;
}

.table th, .table td {
  padding: 10px;
  border-bottom: 1px solid #eee;
  text-align: center;
}

button {
  padding: 10px 15px;
  background: #2E5FA3;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

input {
  width: 80px;
  padding: 5px;
}

.summary {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 15px;
  text-align: center;
}

.metric {
  background: #0F2444;
  color: white;
  padding: 15px;
  border-radius: 10px;
}

</style>
</head>

<body>

<div class="container">

<h1>VeriScore Vault Simulator</h1>

<div class="card">
<h2>Add Receivables</h2>

<table class="table" id="table">
<thead>
<tr>
<th>Asset</th>
<th>Score</th>
<th>PD</th>
<th>Amount ($)</th>
<th>Yield %</th>
<th>Expected Loss</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<button onclick="addRow()">Add Receivable</button>
<button onclick="calculatePortfolio()">Run Simulation</button>

</div>

<div class="card summary">
<div class="metric">Total Capital<br><span id="total">$0</span></div>
<div class="metric">Avg PD<br><span id="avgpd">0%</span></div>
<div class="metric">Expected Loss<br><span id="el">0%</span></div>
<div class="metric">Net Yield<br><span id="yield">0%</span></div>
</div>

<div class="card">
<h2>Allocator Insight</h2>
<p id="insight">Run simulation to view allocation insights</p>
</div>

</div>

<script>

function addRow(){
  let row = `
  <tr>
    <td>Shipment</td>
    <td><input value="80"></td>
    <td class="pd">--</td>
    <td><input value="100000"></td>
    <td><input value="12"></td>
    <td class="el">--</td>
  </tr>
  `;
  document.getElementById("rows").innerHTML += row;
}

function calculatePortfolio(){

  let rows = document.querySelectorAll("#rows tr");

  let totalCapital = 0;
  let totalPD = 0;
  let totalEL = 0;
  let totalYield = 0;

  rows.forEach(r=>{
    let score = parseFloat(r.children[1].children[0].value);
    let amount = parseFloat(r.children[3].children[0].value);
    let yieldRate = parseFloat(r.children[4].children[0].value)/100;

    let pd;
    if(score >= 85) pd = 0.015;
    else if(score >= 70) pd = 0.04;
    else pd = 0.08;

    let lgd = 0.3;
    let el = pd * lgd;

    r.querySelector(".pd").innerText = (pd*100).toFixed(2)+"%";
    r.querySelector(".el").innerText = (el*100).toFixed(2)+"%";

    totalCapital += amount;
    totalPD += pd * amount;
    totalEL += el * amount;
    totalYield += yieldRate * amount;
  });

  let avgPD = totalPD / totalCapital;
  let avgEL = totalEL / totalCapital;
  let netYield = (totalYield / totalCapital) - avgEL;

  document.getElementById("total").innerText = "$"+totalCapital.toLocaleString();
  document.getElementById("avgpd").innerText = (avgPD*100).toFixed(2)+"%";
  document.getElementById("el").innerText = (avgEL*100).toFixed(2)+"%";
  document.getElementById("yield").innerText = (netYield*100).toFixed(2)+"%";

  let insight = "";

  if(netYield > 0.08){
    insight = "High-performing vault. Strong allocation candidate.";
  } else if(netYield > 0.04){
    insight = "Balanced risk-return profile.";
  } else {
    insight = "Risk outweighs return. Rebalance toward higher scores.";
  }

  document.getElementById("insight").innerText = insight;

}

addRow();
addRow();

</script>

</body>
</html>
